// ===== R012 =====
function parseR012(wb){const sh=wb.Sheets[wb.SheetNames[0]],rg=XLSX.utils.decode_range(sh['!ref']);let hR=-1,cI=-1,cU=-1;
for(let r=0;r<=Math.min(20,rg.e.r);r++){for(let c=0;c<=rg.e.c;c++){const cl=sh[XLSX.utils.encode_cell({r,c})];if(!cl)continue;const v=String(cl.v).toLowerCase().trim();if(v==='item')cI=c;if(v.includes('unidad de despacho')||v.includes('unidad despacho'))cU=c}if(cI>=0&&cU>=0){hR=r;break}}
if(hR===-1)return null;const map={};let total=0,gt1=0;
for(let r=hR+1;r<=rg.e.r;r++){const clI=sh[XLSX.utils.encode_cell({r,c:cI})],clU=sh[XLSX.utils.encode_cell({r,c:cU})];if(!clI)continue;const item=String(clI.v).trim();if(!item||!/^\d+$/.test(item))continue;const ud=clU?parseInt(String(clU.v))||1:1;total++;if(ud>1){map[item]=ud;gt1++}}
return{map,total,gt1}}

// ===== R120 =====
function parseR120(wb){const sh=wb.Sheets[wb.SheetNames[0]],rg=XLSX.utils.decode_range(sh['!ref']);let rd='';
for(let r=0;r<=Math.min(5,rg.e.r);r++){for(let c=0;c<=rg.e.c;c++){const cl=sh[XLSX.utils.encode_cell({r,c})];if(cl){const v=String(cl.v).trim(),m=v.match(/^(\d{2})-(\d{2})-(\d{4})$/);if(m){rd=`${m[2]}/${m[1]}/${m[3]}`;break}}}if(rd)break}
let hR=-1,cM={};for(let r=0;r<=Math.min(20,rg.e.r);r++){let rt='';for(let c=0;c<=rg.e.c;c++){const cl=sh[XLSX.utils.encode_cell({r,c})];if(cl)rt+=' '+String(cl.v).toLowerCase()}
if(rt.includes('zona')&&(rt.includes('tem')||rt.includes('ítem'))){hR=r;for(let c=0;c<=rg.e.c;c++){const cl=sh[XLSX.utils.encode_cell({r,c})];if(!cl)continue;const v=String(cl.v).toLowerCase().trim();if(v==='zona')cM.z=c;else if(v.includes('puesto'))cM.p=c;else if(v==='ítem'||v==='item')cM.i=c;else if(v.includes('descripci'))cM.d=c;else if(v.includes('unidades en puesto'))cM.uP=c;else if(v.includes('unidades pedidas'))cM.uD=c;else if(v==='bultos')cM.b=c;else if(v.includes('tipo'))cM.t=c;else if(v.includes('cant tiendas')||v.includes('tiendas solicitantes'))cM.ti=c}break}}
if(hR===-1)return null;const gV=(r,c)=>{if(c===undefined)return'';const cl=sh[XLSX.utils.encode_cell({r,c})];return cl?String(cl.v).trim():''};const gN=(r,c)=>{if(c===undefined)return 0;const cl=sh[XLSX.utils.encode_cell({r,c})];if(!cl)return 0;return parseFloat(String(cl.v).replace(/,/g,''))||0};
const rows=[];for(let r=hR+1;r<=rg.e.r;r++){const zona=gV(r,cM.z);if(!zona)continue;const item=gV(r,cM.i);if(!item||!/^\d+$/.test(item))continue;const fc=zona[0].toUpperCase();rows.push({zona,item,area:AM[fc]||'SIN PUESTO',piso:PM[fc]||'S',puesto:gV(r,cM.p),desc:gV(r,cM.d),uP:gN(r,cM.uP),uD:gN(r,cM.uD),bul:gN(r,cM.b),tipo:gV(r,cM.t),ti:gN(r,cM.ti),ud:udMap[item]||1})}
rows.sort((a,b)=>a.zona.localeCompare(b.zona));
let aD2='',aDow='',aDN='';if(rd){const a=addDay(rd);aD2=a.str;aDow=a.dow;aDN=a.dowName}
return{rows,rd:aD2,dow:aDow,dowName:aDN}}

// ===== Compute =====
function compute(d){const s=(a,k)=>a.reduce((x,r)=>x+r[k],0);const tU=s(d,'uD'),sinP=s(d.filter(r=>r.area==='SIN PUESTO'),'uD'),bol=s(d.filter(r=>r.item===BI),'uD');
const byA={};for(const a of['BO','MEDICINA','SDA','SDA NUEVO','PTL','SUMINISTROS','PSICOTROPICOS','SIN PUESTO']){const f=d.filter(r=>r.area===a);byA[a]={u:s(f,'uD'),l:s(f,'ti'),b:s(f,'bul'),c:f.length}}
const p=byA.PTL,m=byA.MEDICINA,s1=byA.SDA,s2=byA['SDA NUEVO'],su=byA.SUMINISTROS,ps=byA.PSICOTROPICOS,bo=byA.BO;
const tL=p.l+m.l+s1.l+s2.l+su.l+ps.l,tM=p.u+m.u+s1.u+s2.u;
// PTB (Pick to Belt): Pisos A,B,C,D — PTP (Pick to Pallet): Pisos 1,2,4
const PTB_PISOS=['A','B','C','D'],PTP_PISOS=['1','2','4'];
const boPTB=d.filter(r=>r.area==='BO'&&PTB_PISOS.includes(String(r.piso)));
const boPTP=d.filter(r=>r.area==='BO'&&PTP_PISOS.includes(String(r.piso)));
const ptbB=s(boPTB,'bul'),ptbU=s(boPTB,'uD'),ptpB=s(boPTP,'bul'),ptpU=s(boPTP,'uD');
const pisos={};d.forEach(r=>{const k=String(r.piso);if(!pisos[k])pisos[k]={area:r.area,und:0,pick:0,ti:0,ct:0};pisos[k].und+=r.uD;pisos[k].pick+=r.uD/r.ud;pisos[k].ti+=r.ti;pisos[k].ct++});
return{tU,tC:tU-sinP,bol,tSB:tU-bol,sinP,ptl:p,med:m,sda1:s1,sda2:s2,sumin:su,psico:ps,bo,ptbB,ptbU,ptpB,ptpU,tL,tM,pSDA:tL>0?(s1.l+s2.l)/tL:0,nI:d.length,pisos}}

function renderPiso(r){const ps=r.pisos;const keys=Object.keys(ps).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));let rows='';
keys.forEach(k=>{const p=ps[k];const rel=p.ti>0?p.pick/p.ti:0;rows+=`<div class="gr pc"><div class="vl" style="font-weight:800;color:var(--navy)">${k}</div><div>${bg(p.area,AC[p.area]||'#94A3B8')}</div><div class="vl">${fmt(Math.round(p.und))}</div><div class="v2">${fmt(Math.round(p.pick))}</div><div class="rt">${fD(rel)}</div></div>`});
document.getElementById('tPiso').innerHTML=`<div class="panel"><div class="ph">Relación Und × Línea por Piso</div><div style="padding:7px 14px;font-size:.69rem;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border)"><b>Pickings</b> = Und Pedidas ÷ Und Despacho · <b>Rel Und×Línea</b> = Σ Pickings ÷ Σ Tiendas · <span style="color:var(--blue);font-weight:700">${udSource}</span></div><div class="gh pc"><div>PISO</div><div>ÁREA</div><div>UND PEDIDAS</div><div>PICKINGS</div><div>REL UND×LÍNEA</div></div>${rows}</div>`}

// ===== History + Report =====
function tI(a,i,k){if(i===0)return'';const c=a[i][k],p=a[i-1][k];return c>p?' <span class="tu">▲</span>':c<p?' <span class="td">▼</span>':' <span class="tf">●</span>'}
function genReport(h){if(h.length<2)return'<div class="rp nt">Se necesitan al menos 2 registros para el informe.</div>';
const avg=arr=>arr.reduce((a,b)=>a+b,0)/arr.length;const last=h[h.length-1];
const byDow={};h.forEach(x=>{if(x.dow===undefined)return;if(!byDow[x.dow])byDow[x.dow]={days:[],tC:[],boB:[],pSDA:[]};byDow[x.dow].days.push(x.date);byDow[x.dow].tC.push(x.tC);byDow[x.dow].boB.push(x.boB);byDow[x.dow].pSDA.push(x.pSDA)});
const dk=Object.keys(byDow).sort((a,b)=>+a-+b);let mxD='',mnD='',mxA=0,mnA=Infinity;
dk.forEach(d=>{const a=avg(byDow[d].tC);if(a>mxA){mxA=a;mxD=d}if(a<mnA){mnA=a;mnD=d}});
let wc='';dk.forEach(d=>{const a=avg(byDow[d].tC);const cls=d===mxD?'wx':d===mnD?'wn':'';wc+=`<div class="wc ${cls}"><div class="wd">${DN[d]}</div><div class="wv">${fmt(Math.round(a))}</div><div class="ws">${byDow[d].days.length} días · BO: ${fmt(Math.round(avg(byDow[d].boB)))}</div></div>`});
const allTC=h.map(x=>x.tC),allBo=h.map(x=>x.boB),allSDA=h.map(x=>x.pSDA);const aTC=avg(allTC),aBo=avg(allBo),aSDA=avg(allSDA);
const tr=(v,a)=>v>a*1.05?'por encima':v<a*0.95?'por debajo':'dentro';const tc=(v,a)=>v>a*1.05?'up':v<a*0.95?'dn':'nt';
const maxTC=Math.max(...allTC),minTC=Math.min(...allTC),mxTCd=h.find(x=>x.tC===maxTC),mnTCd=h.find(x=>x.tC===minTC);
let rpt=`<div class="rp"><h3>📊 Promedio por Día — Total Cargado</h3><div class="wg">${wc}</div>`;
if(dk.length>=2)rpt+=`<p>Mayor carga: <span class="hl">${DN[mxD]}</span> (${fmt(Math.round(mxA))}) · Menor: <span class="hl">${DN[mnD]}</span> (${fmt(Math.round(mnA))}) · Δ ${fD(((mxA-mnA)/mnA)*100)}%</p>`;
rpt+=`<h3>📈 Tendencia (${h.length} registros)</h3><p>Prom Cargado: <span class="hl">${fmt(Math.round(aTC))}</span> · BO: <span class="hl">${fmt(Math.round(aBo))}</span> · SDA: <span class="hl">${fP(aSDA)}</span></p>`;
rpt+=`<p>Último (${last.date}): Cargado <span class="${tc(last.tC,aTC)}">${fmt(last.tC)} (${tr(last.tC,aTC)})</span>, BO <span class="${tc(last.boB,aBo)}">${fmt(last.boB)} (${tr(last.boB,aBo)})</span>, SDA <span class="${tc(last.pSDA,aSDA)}">${fP(last.pSDA)} (${tr(last.pSDA,aSDA)})</span></p>`;
rpt+=`<h3>🔍 Extremos</h3><p>Max carga: <span class="hl">${fmt(maxTC)}</span> el ${mxTCd.date} (${mxTCd.dowName||''}) · Min: <span class="hl">${fmt(minTC)}</span> el ${mnTCd.date} (${mnTCd.dowName||''})</p>`;
if(dk.length>=3){const sd=[...dk].sort((a,b)=>avg(byDow[b].tC)-avg(byDow[a].tC));rpt+=`<h3>💡 Ranking</h3><p>Carga: ${sd.map((d,i)=>`<span class="hl">${i+1}.</span> ${DNS[d]} (${fmt(Math.round(avg(byDow[d].tC)))})`).join(' · ')}</p>`;const bd=[...dk].sort((a,b)=>avg(byDow[b].boB)-avg(byDow[a].boB));rpt+=`<p>Bultos BO: ${bd.map((d,i)=>`<span class="hl">${i+1}.</span> ${DNS[d]} (${fmt(Math.round(avg(byDow[d].boB)))})`).join(' · ')}</p>`}
rpt+=`</div>`;return rpt}

function renderHist(){const h=lH();if(!h.length){document.getElementById('tHis').innerHTML='<div class="empty"><div class="big">📈</div><p>Sin datos históricos</p><p class="hint">Carga archivos R120 para acumular el histórico</p></div>';return}
let rows='';h.forEach((x,i)=>{rows+=`<tr><td class="dc">${x.date}</td><td class="dw">${x.dowName||''}</td><td class="nc">${fmt(x.tU)}</td><td class="nc">${fmt(x.tC)}${tI(h,i,'tC')}</td><td class="nc">${fmt(x.tL)}${tI(h,i,'tL')}</td><td class="nc" style="font-weight:600;color:var(--blue)">${fmt(x.boB)}${tI(h,i,'boB')}</td><td class="mc">${fmt(x.boU)}</td><td class="nc">${fD(x.rel)}</td><td class="nc" style="color:var(--green);font-weight:600">${fP(x.pSDA)}${tI(h,i,'pSDA')}</td><td class="nc">${fmt(x.nI)}</td></tr>`});
const ci=Date.now();document.getElementById('tHis').innerHTML=`<div class="panel hp"><div class="ph"><h2>📅 Histórico (${h.length})</h2><div class="ha"><button onclick="exH()">⬇ CSV</button><button class="danger" onclick="clHist()">🗑 Limpiar</button></div></div><div style="overflow-x:auto"><table class="ht"><thead><tr><th>Fecha</th><th>Día</th><th>Und</th><th>Cargado</th><th>Líneas</th><th>Bul BO</th><th>Und BO</th><th>Rel</th><th>SDA</th><th>Ítems</th></tr></thead><tbody>${rows}</tbody></table></div><div class="ca"><div class="cr"><div class="mc2"><h3>Bultos BO</h3><canvas id="c1_${ci}"></canvas></div><div class="mc2"><h3>Líneas M&M</h3><canvas id="c2_${ci}"></canvas></div><div class="mc2"><h3>Part SDA</h3><canvas id="c3_${ci}"></canvas></div></div></div></div>${genReport(h)}`;
const lb=h.map(x=>x.date);setTimeout(()=>{dCh('c1_'+ci,lb,h.map(x=>x.boB),'#418FDE');dCh('c2_'+ci,lb,h.map(x=>x.tL),'#7C3AED');dCh('c3_'+ci,lb,h.map(x=>+(x.pSDA*100).toFixed(2)),'#059669',true)},50)}

function dCh(id,labels,data,color,isPct){const cv=document.getElementById(id);if(!cv)return;const ctx=cv.getContext('2d'),dp=window.devicePixelRatio||1,pw=cv.parentElement.clientWidth-16;cv.width=pw*dp;cv.height=110*dp;cv.style.width=pw+'px';cv.style.height='110px';ctx.scale(dp,dp);const W=pw,H=110,pa={t:6,r:6,b:20,l:42},cw=W-pa.l-pa.r,ch=H-pa.t-pa.b;if(!data.length)return;const mn=Math.min(...data)*.9,mx=Math.max(...data)*1.06||1;const pts=data.map((v,i)=>({x:pa.l+(data.length>1?i/(data.length-1):.5)*cw,y:pa.t+ch-(v-mn)/(mx-mn)*ch}));ctx.strokeStyle='#E2E8F0';ctx.lineWidth=1;for(let i=0;i<4;i++){const y=pa.t+ch*i/3;ctx.beginPath();ctx.moveTo(pa.l,y);ctx.lineTo(W-pa.r,y);ctx.stroke();const val=mx-(mx-mn)*i/3;ctx.fillStyle='#94A3B8';ctx.font='8px JetBrains Mono';ctx.textAlign='right';ctx.fillText(isPct?val.toFixed(1)+'%':fmt(Math.round(val)),pa.l-2,y+3)}ctx.beginPath();ctx.moveTo(pts[0].x,pa.t+ch);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,pa.t+ch);ctx.closePath();const g=ctx.createLinearGradient(0,pa.t,0,pa.t+ch);g.addColorStop(0,color+'25');g.addColorStop(1,color+'05');ctx.fillStyle=g;ctx.fill();ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();pts.forEach((p,i)=>{ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();if(data.length<=20){ctx.fillStyle='#64748B';ctx.font='7px Montserrat';ctx.textAlign='center';ctx.fillText(labels[i],p.x,H-2)}})}

function exH(){const h=lH();if(!h.length)return;let c='Fecha,Dia,Und,Cargado,Lineas,BultosBO,UndBO,Rel,PartSDA,Items\n';h.forEach(r=>{c+=`${r.date},${r.dowName||''},${r.tU},${r.tC},${r.tL},${r.boB},${r.boU},${fD(r.rel)},${fP(r.pSDA)},${r.nI}\n`});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/csv'}));a.download='historico_depa_'+new Date().toISOString().slice(0,10)+'.csv';a.click()}
function clHist(){if(!confirm('¿Limpiar todo el histórico?'))return;sH([]);renderHist()}

// ===== Data Table =====
let aD=[],sortCol='zona',sortDir=1,colFilters={};
const COLS=[{key:'zona',label:'Zona',cls:'cz',f:1},{key:'puesto',label:'Puesto',cls:'cp'},{key:'item',label:'Ítem',cls:'ci'},{key:'desc',label:'Descripción',cls:'cd'},{key:'uP',label:'Und Puesto',cls:'cn',n:1},{key:'uD',label:'Und Pedidas',cls:'cu',n:1},{key:'bul',label:'Bultos',cls:'cn',n:1},{key:'tipo',label:'Tipo',cls:'',f:1},{key:'ti',label:'Tiendas',cls:'cn',n:1},{key:'piso',label:'Piso',cls:'cz',f:1},{key:'area',label:'Área',cls:'',f:1},{key:'ud',label:'UD',cls:'cn',n:1}];
let cP=0;const PP=50;
function getF(){const txt=document.getElementById('sI')?document.getElementById('sI').value.toLowerCase():'';let d=aD.filter(r=>{if(txt&&!r.desc.toLowerCase().includes(txt)&&!r.item.includes(txt)&&!r.zona.toLowerCase().includes(txt))return false;for(const c of COLS){if(c.f&&colFilters[c.key]&&colFilters[c.key]!=='*'&&String(r[c.key])!==colFilters[c.key])return false}return true});d.sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];if(typeof va==='number')return(va-vb)*sortDir;return String(va).localeCompare(String(vb),undefined,{numeric:true})*sortDir});return d}
function rP(){const f=getF(),tp=Math.max(1,Math.ceil(f.length/PP)),pg=f.slice(cP*PP,(cP+1)*PP);document.getElementById('rC').textContent=fmt(f.length)+'/'+fmt(aD.length);let tb='';for(const r of pg){tb+=`<tr><td class="cz">${r.zona}</td><td class="cp">${r.puesto}</td><td class="ci">${r.item}</td><td class="cd">${r.desc}</td><td class="cn">${fmt(r.uP)}</td><td class="cu">${fmt(r.uD)}</td><td class="cn">${fmt(r.bul)}</td><td>${r.tipo==='PEM'?bg(r.tipo,'#D97706'):bg(r.tipo,'#6366F1')}</td><td class="cn">${r.ti}</td><td class="cz">${r.piso}</td><td>${bg(r.area,AC[r.area]||'#94A3B8')}</td><td class="cn" style="font-weight:600;color:${r.ud>1?'var(--blue)':'var(--text3)'}">${r.ud}</td></tr>`}document.getElementById('dB').innerHTML=tb;const pn=document.getElementById('pN');if(tp>1){pn.style.display='flex';document.getElementById('pI').textContent=`${cP+1}/${tp}`;document.getElementById('bP').disabled=cP===0;document.getElementById('bN').disabled=cP>=tp-1}else{pn.style.display='none'}}
function bCF(){COLS.forEach(c=>{if(!c.f)return;const sel=document.getElementById('cf_'+c.key);if(!sel)return;const vs=[...new Set(aD.map(r=>String(r[c.key])))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));sel.innerHTML='<option value="*">Todos</option>'+vs.map(v=>`<option value="${v}">${v}</option>`).join('');sel.value=colFilters[c.key]||'*'})}
function rDT(){let th='';COLS.forEach(c=>{const is=sortCol===c.key;const aw=is?(sortDir===1?'▲':'▼'):'⇅';th+=`<th><div class="tw"><div class="tl${is?' st':''}" data-col="${c.key}">${c.label} <span class="si">${aw}</span></div>${c.f?`<select class="cf" id="cf_${c.key}" data-col="${c.key}"></select>`:''}</div></th>`});
document.getElementById('tDat').innerHTML=`<div class="sb"><input type="text" id="sI" placeholder="Buscar ítem, descripción o zona..."><span class="ct" id="rC"></span></div><div class="dw2"><table class="d2"><thead><tr>${th}</tr></thead><tbody id="dB"></tbody></table></div><div class="pg" id="pN" style="display:none"><button id="bP" onclick="cP--;rP()">←</button><span style="font-size:.66rem;color:var(--text3)" id="pI"></span><button id="bN" onclick="cP++;rP()">→</button></div>`;
document.getElementById('sI').addEventListener('input',()=>{cP=0;rP()});document.querySelectorAll('.tl').forEach(el=>{el.addEventListener('click',()=>{const col=el.dataset.col;if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1}rDT()})});document.querySelectorAll('.cf').forEach(sel=>{sel.addEventListener('change',()=>{colFilters[sel.dataset.col]=sel.value;cP=0;rP()})});bCF();rP()}

// ===== Tabs =====
document.getElementById('tb').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('#tb button').forEach(x=>x.classList.remove('active'));b.classList.add('active');const t=b.dataset.tab;['tRes','tPiso','tDat','tHis'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById(t==='res'?'tRes':t==='piso'?'tPiso':t==='dat'?'tDat':'tHis').style.display='';if(t==='his')renderHist()});

// ===== Process =====
let lastR120wb=null;
function processAll(){if(!lastR120wb)return;const p=parseR120(lastR120wb);if(!p||!p.rows.length)return;
aD=p.rows;colFilters={};sortCol='zona';sortDir=1;cP=0;
const res=compute(p.rows);renderRes(res);renderPiso(res);rDT();
const dk=p.rd||nw.toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'});
const h=lH();const ex=h.findIndex(x=>x.date===dk);
const en={date:dk,dow:p.dow,dowName:p.dowName,tU:res.tU,tC:res.tC,tL:res.tL,tM:res.tM,boU:res.bo.u,boB:res.bo.b,rel:res.tL>0?res.tM/res.tL:0,pSDA:res.pSDA,nI:res.nI};
if(ex>=0)h[ex]=en;else h.push(en);
h.sort((a,b)=>{const pa=a.date.split('/'),pb=b.date.split('/');return new Date(pa[2],pa[1]-1,pa[0])-new Date(pb[2],pb[1]-1,pb[0])});
sH(h);
document.getElementById('ct').style.display='';document.getElementById('es').style.display='none';
document.querySelectorAll('#tb button').forEach(x=>x.classList.remove('active'));document.querySelector('#tb button[data-tab="res"]').classList.add('active');
['tRes','tPiso','tDat','tHis'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('tRes').style.display=''}

function sE(m){document.getElementById('eb').textContent='⚠️ '+m;document.getElementById('eb').style.display=''}

// ===== File Handlers =====
function loadR120(file){document.getElementById('dtR120').innerHTML='<span class="spinner"></span>Procesando...';document.getElementById('eb').style.display='none';
const reader=new FileReader();reader.onload=function(e){try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const test=parseR120(wb);if(!test||!test.rows.length){sE('Estructura R120 no detectada');document.getElementById('dtR120').textContent='R120 — Detalle por Ítem CENDIS';return}lastR120wb=wb;document.getElementById('dtR120').textContent='R120 — Detalle por Ítem CENDIS';document.getElementById('ftR120').style.display='';document.getElementById('ftR120').textContent='✓ '+file.name+(test.rd?' — DEPA '+test.rd+' ('+test.dowName+')':'');document.getElementById('dzR120').classList.add('loaded');processAll()}catch(err){sE('Error: '+err.message);document.getElementById('dtR120').textContent='R120 — Detalle por Ítem CENDIS'}};reader.readAsArrayBuffer(file)}

function loadR012(file){document.getElementById('dtR012').innerHTML='<span class="spinner"></span>Procesando...';document.getElementById('eb').style.display='none';
const reader=new FileReader();reader.onload=function(e){try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const r=parseR012(wb);if(!r){sE('No se detectó ITEM + UNIDAD DE DESPACHO');document.getElementById('dtR012').textContent='R012 — Maestro de Items';return}udMap=r.map;udSource='R012 ('+fmt(r.gt1)+' con UD>1)';document.getElementById('dtR012').textContent='R012 — Maestro de Items';document.getElementById('ftR012').style.display='';document.getElementById('ftR012').textContent='✓ '+file.name+' — '+fmt(r.gt1)+' UD>1';document.getElementById('dzR012').classList.add('loaded');if(lastR120wb)processAll()}catch(err){sE('Error R012: '+err.message);document.getElementById('dtR012').textContent='R012 — Maestro de Items'}};reader.readAsArrayBuffer(file)}

function wDZ(dz,fi,h){const d=document.getElementById(dz),f=document.getElementById(fi);d.addEventListener('click',()=>f.click());d.addEventListener('dragover',e=>{e.preventDefault();d.classList.add('over')});d.addEventListener('dragleave',()=>d.classList.remove('over'));d.addEventListener('drop',e=>{e.preventDefault();d.classList.remove('over');if(e.dataTransfer.files[0])h(e.dataTransfer.files[0])});f.addEventListener('change',e=>{if(e.target.files[0])h(e.target.files[0]);f.value=''})}
wDZ('dzR120','fiR120',loadR120);wDZ('dzR012','fiR012',loadR012);

// ===== Init: show history if exists =====
const initH=lH();
if(initH.length>0){
  document.getElementById('ct').style.display='';document.getElementById('es').style.display='none';
  document.querySelectorAll('#tb button').forEach(x=>x.classList.remove('active'));
  document.querySelector('#tb button[data-tab="his"]').classList.add('active');
  ['tRes','tPiso','tDat'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('tHis').style.display='';
  renderHist();
  document.getElementById('eH').innerHTML+='<br><strong style="color:#418FDE">✓ '+initH.length+' registros</strong>';
}
</script></body></html>
